name: Build for 10.0-noble-chiseled

on:
  schedule:
    - cron: '0 */12 * * *'
  push:
    branches: [ "main" ]

env:
  VERSION: "10.0-noble-chiseled"
  DH_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/dotnet-runtime
  BASE_IMAGE: mcr.microsoft.com/dotnet/aspnet:10.0-noble-chiseled

jobs:

  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create self-signed certificate
        run: |
          openssl req -x509 -newkey rsa:4096 -nodes -out server.crt -keyout server.key -days 3650 -subj "/CN=localhost"
          openssl pkcs12 -export -inkey server.key -in server.crt -passout pass:root -out server.pfx

      - name: Build Image
        run: |
          docker build . --pull \
            -f ./${{ env.VERSION }}/Dockerfile \
            -t ${{ env.DH_IMAGE_NAME }}:${{ env.VERSION }}

      - name: Push Image to DockerHub
        run: |
          docker push ${{ env.DH_IMAGE_NAME }}:${{ env.VERSION }}
