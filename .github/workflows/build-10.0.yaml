name: Build for 10.0

on:
  schedule:
    - cron: '0 */12 * * *'
  push:
    branches: [ "main" ]

env:
  VERSION: "10.0"
  DH_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/dotnet-runtime
  BASE_IMAGE: mcr.microsoft.com/dotnet/aspnet:10.0

jobs:

  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create self-signed certificate
        run: |
          openssl req -x509 -newkey rsa:4096 -nodes -out server.crt -keyout server.key -days 3650 -subj "/CN=localhost"
          openssl pkcs12 -export -inkey server.key -in server.crt -passout pass:root -out server.pfx

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ env.VERSION }}/Dockerfile
          push: true
          platforms: |
            linux/amd64
          tags: |
            ${{ env.DH_IMAGE_NAME }}:${{ env.VERSION }}
